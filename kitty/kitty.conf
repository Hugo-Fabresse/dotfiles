# ───────────────────────────────────────────
# kitty — configuration minimaliste
# DA : noir absolu, blanc pur, zéro bruit
# ───────────────────────────────────────────

# SHELL
shell /usr/bin/zsh

# ───────────────────────────────────────────
# FONT
# ───────────────────────────────────────────
font_family      Maple Mono NF Bold
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono Bold Italic
font_size        11.0

adjust_line_height  100%
adjust_column_width -1


# ───────────────────────────────────────────
# COULEURS — noir absolu / blanc pur
# ───────────────────────────────────────────
background            #000000
foreground            #ffffff

selection_background  #ffffff
selection_foreground  #000000

cursor                #ffffff
cursor_text_color     #000000
cursor_shape          block
cursor_blink_interval 0

# Noir
color0  #000000
color8  #444444

# Rouge
color1  #cc3333
color9  #ff4444

# Vert
color2  #559944
color10 #66bb55

# Jaune
color3  #999922
color11 #cccc44

# Bleu
color4  #336699
color12 #4488bb

# Magenta
color5  #775599
color13 #9966bb

# Cyan
color6  #228899
color14 #33aaaa

# Blanc
color7  #aaaaaa
color15 #ffffff

# ───────────────────────────────────────────
# FENÊTRE
# ───────────────────────────────────────────
window_padding_width    16
window_padding_height   12
hide_window_decorations yes
background_opacity      0.92
dynamic_background_color no

remember_window_size    yes
initial_window_width    120c
initial_window_height   36c

# ───────────────────────────────────────────
# TABS — désactivés
# ───────────────────────────────────────────
tab_bar_style hidden

# ───────────────────────────────────────────
# PERFORMANCES
# ───────────────────────────────────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ───────────────────────────────────────────
# DIVERS
# ───────────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0
close_on_child_death    yes
confirm_os_window_close 0
strip_trailing_spaces   smart
